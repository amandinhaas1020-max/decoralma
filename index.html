<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decoralma</title>
<style>
:root{--verde:#536042;--verde2:#354020;--bege:#fffaf4;--bege2:#f0e5d7;--borda:#e6dbcf;--marrom:#3b3228}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:var(--bege);color:var(--marrom)}header{height:88px;background:#fffaf6;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;padding:0 7%;position:sticky;top:0;z-index:10}header h2{font-family:Georgia,serif;color:var(--verde2);font-size:32px}nav{display:flex;gap:22px;font-size:13px;font-weight:bold}nav a{color:var(--marrom);text-decoration:none;cursor:pointer}.cart{cursor:pointer;font-weight:bold;color:var(--verde2)}
.hero{min-height:470px;display:flex;align-items:center;padding:0 9%;background-size:cover;background-position:center}.hero-box{max-width:430px;background:rgba(255,250,244,.78);padding:25px;border-radius:25px}.hero h1{font-family:Georgia,serif;font-size:64px;line-height:.9;color:var(--verde2)}.hero p{margin:18px 0;line-height:1.6}.btn{border:0;background:var(--verde);color:white;padding:13px 26px;border-radius:999px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}
.section{padding:42px 7%}.title{text-align:center;margin-bottom:26px}.title h2{font-family:Georgia,serif;font-size:38px;color:var(--verde2)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.card{background:white;border:1px solid var(--borda);border-radius:20px;overflow:hidden;box-shadow:0 8px 24px rgba(72,55,34,.06)}.card img{width:100%;height:230px;object-fit:cover}.card-body{padding:17px;text-align:center}.card h3{font-family:Georgia,serif;color:var(--verde2);font-size:24px}.card p{font-size:13px;line-height:1.5;margin:8px 0}.card strong{display:block;color:var(--verde2);margin:8px}.card button{margin:5px;border:1px solid var(--verde);background:var(--verde);color:white;border-radius:999px;padding:10px 16px;font-size:12px;font-weight:bold}.card button.light{background:#fff;color:var(--verde)}
.inspire{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.inspire img{width:100%;height:180px;object-fit:cover;border-radius:18px}footer{background:var(--bege2);padding:35px 7%;text-align:center;border-top:1px solid var(--borda)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center;padding:20px}.modal.active{display:flex}.modal-box{background:white;border-radius:24px;padding:24px;max-width:540px;width:100%;max-height:90vh;overflow:auto}.modal-box h2{font-family:Georgia,serif;color:var(--verde2);margin-bottom:12px}.cart-item{display:grid;grid-template-columns:65px 1fr auto;gap:10px;align-items:center;border-bottom:1px solid var(--borda);padding:12px 0}.cart-item img{width:65px;height:65px;object-fit:cover;border-radius:12px}.checkout input,.checkout textarea{width:100%;padding:12px;border:1px solid var(--borda);border-radius:14px;margin:6px 0}
@media(max-width:800px){header{padding:0 4%;height:auto;min-height:78px;flex-wrap:wrap}nav{order:3;width:100%;overflow-x:auto;padding-bottom:10px}.hero h1{font-size:46px}.grid{grid-template-columns:repeat(2,1fr);gap:11px}.card img{height:140px}.inspire{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h2>Decoralma</h2>
  <nav>
    <a onclick="scrollToSec('colecoes')">Nossos Destaques</a>
    <a onclick="scrollToSec('acessorios')">Acessórios</a>
    <a onclick="scrollToSec('inspire')">Inspire-se</a>
  </nav>
  <div class="cart" onclick="abrirCarrinho()">Sacola (<span id="qtd">0</span>)</div>
</header>

<section class="hero" id="hero">
  <div class="hero-box">
    <h1 id="heroTitulo">Decoração<br>com sua<br>assinatura</h1>
    <p id="heroTexto">Peças exclusivas em MDF multicamada que transformam ambientes em experiências únicas.</p>
    <button class="btn" onclick="scrollToSec('colecoes')">CONHEÇA AS COLEÇÕES</button>
  </div>
</section>

<section class="section" id="colecoes">
  <div class="title"><h2>Nossos Destaques</h2></div>
  <div class="grid" id="listaColecoes"></div>
</section>

<section class="section">
  <div class="title"><h2>Produtos</h2></div>
  <div class="grid" id="listaProdutos"></div>
</section>

<section class="section" id="acessorios">
  <div class="title"><h2>Acessórios</h2></div>
  <div class="grid" id="listaAcessorios"></div>
</section>

<section class="section" id="inspire">
  <div class="title"><h2>Inspire-se</h2></div>
  <div class="inspire" id="listaInspire"></div>
</section>

<footer>© Decoralma. Decoração com sua assinatura.</footer>

<div class="modal" id="modalCarrinho">
  <div class="modal-box">
    <h2>Meu Carrinho</h2>
    <div id="itensCarrinho"></div>
    <h3 id="totalCarrinho"></h3>
    <div class="checkout">
      <input id="clienteNome" placeholder="Nome completo">
      <input id="clienteTelefone" placeholder="Telefone / WhatsApp">
      <input id="clienteCep" placeholder="CEP">
      <textarea id="clienteEndereco" placeholder="Endereço completo"></textarea>
      <button class="btn" onclick="finalizarPedido()">Finalizar pedido</button>
      <button class="btn" style="background:#999" onclick="fecharCarrinho()">Fechar</button>
    </div>
  </div>
</div>

<script>
let dados=null,carrinho=[];
function moedaNum(v){return Number(String(v||'0').replace('R$','').replace('.','').replace(',','.').trim())||0}
function numMoeda(n){return 'R$ '+Number(n||0).toFixed(2).replace('.',',')}
function img(src){return src||'https://images.unsplash.com/photo-1618220179428-22790b461013?auto=format&fit=crop&w=700&q=80'}
function scrollToSec(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'})}
async function carregar(){
  const r=await fetch('/api/site-data'); dados=await r.json(); render();
}
function render(){
  hero.style.backgroundImage=`linear-gradient(90deg,rgba(255,250,244,.9),rgba(255,250,244,.2)),url('${img(dados.hero.img)}')`;
  heroTitulo.innerHTML=dados.hero.titulo||'Decoração<br>com sua<br>assinatura';
  heroTexto.innerText=dados.hero.texto||'';
  listaColecoes.innerHTML=(dados.colecoes||[]).map((c,i)=>`<div class="card"><img src="${img(c.img)}"><div class="card-body"><h3>${c.icone||''} ${c.nome}</h3><p>${c.desc||''}</p></div></div>`).join('');
  listaProdutos.innerHTML=(dados.produtos||[]).map((p,i)=>cardProduto(p,'produto',i)).join('');
  listaAcessorios.innerHTML=(dados.acessorios||[]).map((p,i)=>cardProduto(p,'acessorio',i)).join('');
  listaInspire.innerHTML=(dados.inspire||[]).map(x=>`<img src="${img(x)}">`).join('');
  qtd.innerText=carrinho.reduce((s,p)=>s+p.qtd,0);
}
function cardProduto(p,tipo,i){return `<div class="card"><img src="${img(p.img)}"><div class="card-body"><h3>${p.nome}</h3><strong>${p.preco||'R$ 0,00'}</strong><button onclick="addCarrinho('${tipo}',${i})">Adicionar ao carrinho</button><button class="light" onclick="comprarAgora('${tipo}',${i})">Comprar agora</button></div></div>`}
function pegar(tipo,i){return tipo==='produto'?dados.produtos[i]:dados.acessorios[i]}
function addCarrinho(tipo,i){const p=pegar(tipo,i);const ex=carrinho.find(x=>x.nome===p.nome);if(ex)ex.qtd++;else carrinho.push({...p,qtd:1});render();alert('Produto adicionado ao carrinho!')}
function comprarAgora(tipo,i){addCarrinho(tipo,i);abrirCarrinho()}
function abrirCarrinho(){modalCarrinho.classList.add('active');renderCarrinho()}
function fecharCarrinho(){modalCarrinho.classList.remove('active')}
function renderCarrinho(){let total=0;itensCarrinho.innerHTML=carrinho.map((p,i)=>{total+=moedaNum(p.preco)*p.qtd;return `<div class="cart-item"><img src="${img(p.img)}"><div><b>${p.nome}</b><br><small>${p.qtd}x ${p.preco}</small></div><button onclick="remover(${i})">X</button></div>`}).join('')||'<p>Carrinho vazio.</p>';totalCarrinho.innerText='Total: '+numMoeda(total)}
function remover(i){carrinho.splice(i,1);render();renderCarrinho()}
async function finalizarPedido(){
  if(!carrinho.length)return alert('Carrinho vazio.');
  const pedido={nome:clienteNome.value,telefone:clienteTelefone.value,cep:clienteCep.value,endereco:clienteEndereco.value,itens:carrinho,total:totalCarrinho.innerText};
  await fetch('/api/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pedido)});
  alert('Pedido enviado!');
  carrinho=[];render();fecharCarrinho();
}
carregar();
</script>
</body>
</html>
